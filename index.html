<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltix Mobile</title>

    <link rel="stylesheet" href="styler/index.css">
</head>

<!--projeto=Voltix Mobile-->
<header>
    <h1>Bem-vindo ao Voltix Mobile</h1>

    <div class="topo">
        <!-- LOGO -->
        <div class="logo">
            <img src="assets/logo.png" alt="Logo da KL Moda Fitness">
        </div>
        <!-- caixa de pesquisa -->
        <div class="caixa-pesquisa">
            <img src="assets/pesquisablack.png" alt="Ícone de pesquisa">
            <input type="text" placeholder="O que você está procurando?">

        </div>
        <!-- ÍCONES -->
        <div class="icones">
            <a href="">
                <img src="assets/user.png" alt="login">
                <SMALL>Olá visitante</SMALL>
                <p>ENTRAR</p>
            </a>
            <a href="">
                <img src="assets/cart-shopping-fast.png" alt="carrinho">
                <SMALL>Meu</SMALL>
                <p>CARRINHO</p>
            </a>
        </div>
    </div>
    <!--projeto=Voltix Mobile-->
    <NAV class="menu">

        <a href="#">HOME</a>
        <a href="#">CARRINHO</a>
        <a id="mobile" href="#">LOGIN</a>
        <a href="#">CADASTRO</a>
        <a href="#">MAIS VENDIDOS</a>
        <a href="#">RASTREADOR DE PEDIDOS</a>
    </NAV>

</header>
<!-- BANNER -->
<div classe="banner">
    <div class="imagens-banner">
        <img src="assets/BANNER.png" alt="Banner 1">

    </div>
    <div class="botoes banner">


    </div>

</div>
<!-- FINALIZAÇAO DA AREA DO BANNER DA LOJA -->

<!-- ÁREA DE OFERTAS -->
<section class="ofertas">

    <div class="titulo-ofertas">
        <div class="texto-promocoes">
            <h2>OFERTAS IMPERDÍVEIS</h2>
            <p>Confira as melhores ofertas!</p>
        </div>
        <a href="#" class="ver-tudo">Ver Tudo</a>
    </div>

    <div class="lista-produtos">
        <div class="card-produto">
            <div class="imagem-botao">
            <img src="assets/produto1.png" alt="Produto 1">
            <button class="btn-favoritar">
                <img src="assets/favorito.png" alt="Adicionar aos favoritos">
            </button>
            </div>
            <h3>nome do produto</h3>
            <p>R$ 99,90</p>
            <button class="btn-adicionar">
                <img src="assets/add-to-cart.png" alt="Adicionar ao carrinho">

            </button>

        </div>

</section>



</body>

</html>
